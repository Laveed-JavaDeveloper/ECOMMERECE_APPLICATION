<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men's Fashion Store</title>
    <style>
        :root {
            color-scheme: dark;
            --panel: rgba(11, 20, 35, 0.86);
            --border: rgba(148, 163, 184, 0.16);
            --accent: #f59e0b;
            --text: #e5eefb;
            --muted: #94a3b8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(245, 158, 11, 0.12), transparent 32%),
                linear-gradient(135deg, #07111f 0%, #0f172a 48%, #111827 100%);
            color: var(--text);
        }
        .shell { min-height: 100vh; padding: 1.5rem; }
        .hero {
            max-width: 1280px;
            margin: 0 auto 1.5rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(7, 17, 31, 0.9));
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 22px 70px rgba(0, 0, 0, 0.32);
        }
        .hero-top {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .brand { display: flex; flex-direction: column; gap: .35rem; }
        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.24em;
            font-size: 0.75rem;
            color: var(--muted);
        }
        h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1.02;
        }
        .lead {
            margin: 0.9rem 0 0;
            max-width: 66ch;
            color: #cbd5e1;
            line-height: 1.7;
        }
        .top-links { display: flex; gap: .6rem; flex-wrap: wrap; }
        .pill, .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform .18s ease, background-color .18s ease, border-color .18s ease;
        }
        .pill {
            padding: .65rem 1rem;
            border: 1px solid var(--border);
            color: var(--text);
            background: rgba(255,255,255,.02);
        }
        .pill:hover, .button:hover { transform: translateY(-1px); }
        .category-bar {
            max-width: 1280px;
            margin: 0 auto 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: .65rem;
        }
        .category-bar a.active {
            background: var(--accent);
            color: #111827;
            border-color: transparent;
        }
        .catalog {
            max-width: 1280px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 1rem;
            animation: fadeUp .4s ease both;
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
            display: flex;
            flex-direction: column;
            min-height: 100%;
            animation: fadeUp .35s ease both;
        }
        .card:hover { transform: translateY(-2px); transition: transform .18s ease; }
        .image-wrap {
            background: #0b1220;
            aspect-ratio: 4 / 4;
            display: grid;
            place-items: center;
            border-bottom: 1px solid var(--border);
        }
        .image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-body {
            padding: 1rem 1rem 1.1rem;
            display: flex;
            flex-direction: column;
            gap: .7rem;
            flex: 1;
        }
        .meta {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: start;
        }
        .product-name { margin: 0; font-size: 1.05rem; line-height: 1.35; }
        .category { color: var(--muted); font-size: .82rem; text-transform: uppercase; letter-spacing: .12em; }
        .price { color: var(--accent); font-size: 1.2rem; font-weight: 800; white-space: nowrap; }
        .desc {
            color: #cbd5e1;
            line-height: 1.6;
            margin: 0;
            font-size: .95rem;
        }
        .card-actions {
            margin-top: auto;
            display: flex;
            gap: .65rem;
            flex-wrap: wrap;
        }
        .button {
            padding: .78rem 1rem;
            border: 1px solid transparent;
            background: var(--accent);
            color: #111827;
        }
        .button.secondary {
            background: transparent;
            color: var(--text);
            border-color: var(--border);
        }
        .top-links a { color: var(--text); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 640px) {
            .shell { padding: 1rem; }
            .hero { padding: 1.15rem; border-radius: 18px; }
        }
    </style>
</head>
<body>
<main class="shell">
    <section class="hero">
        <div class="hero-top">
            <div class="brand">
                <div class="eyebrow">Men's Fashion Store · India</div>
                <h1>Sharp looks. INR pricing. Real product flow.</h1>
                <p class="lead">Browse curated shirts, pants, t-shirts, track pants, shoes, hoodies, and shorts with a clean cart and checkout experience built for local development.</p>
            </div>
            <div class="top-links">
                <a class="pill" th:href="@{/cart}">Cart</a>
                <a class="pill" th:href="@{/checkout}">Checkout</a>
                <a class="pill" th:href="@{/h2-console}">H2 Console</a>
            </div>
        </div>
    </section>

    <nav class="category-bar">
        <a class="pill" th:classappend="${selectedCategory == null} ? ' active' : ''" th:href="@{/}">All</a>
        <a class="pill" th:each="category : ${categories}" th:classappend="${selectedCategory != null and selectedCategory == category} ? ' active' : ''" th:href="@{'/?category=' + ${category}}" th:text="${category.displayName}"></a>
    </nav>

    <section class="catalog">
        <article class="card" th:each="product, stat : ${products}" th:style="'animation-delay:' + ${stat.index * 40} + 'ms'">
            <a class="image-wrap" th:href="@{/products/{id}(id=${product.id})}">
                <img th:src="@{${product.imageUrl}}" th:alt="${product.name}">
            </a>
            <div class="card-body">
                <div class="meta">
                    <div>
                        <div class="category" th:text="${product.category.displayName}"></div>
                        <h2 class="product-name" th:text="${product.name}"></h2>
                    </div>
                    <div class="price" th:text="'₹' + ${#numbers.formatDecimal(product.priceInr, 1, 2)}"></div>
                </div>
                <p class="desc" th:text="${product.description}"></p>
                <div class="card-actions">
                    <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                        <input type="hidden" name="quantity" value="1">
                        <button class="button" type="submit">Add to Cart</button>
                    </form>
                    <a class="button secondary" th:href="@{/products/{id}(id=${product.id})}">View Details</a>
                </div>
            </div>
        </article>
    </section>
</main>
</body>
</html>
