<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name}">Product Details</title>
    <style>
        :root { color-scheme: dark; --border:rgba(148,163,184,.16); --accent:#f59e0b; --text:#e5eefb; --muted:#94a3b8; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #07111f 0%, #0f172a 100%);
            color: var(--text);
            padding: 1.5rem;
        }
        .wrap { max-width: 1180px; margin: 0 auto; }
        .back { display: inline-block; margin-bottom: 1rem; color: var(--text); text-decoration: none; }
        .grid {
            display: grid;
            grid-template-columns: minmax(280px, 1fr) minmax(0, 1fr);
            gap: 1rem;
            align-items: start;
        }
        .panel {
            background: rgba(16, 25, 43, 0.92);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 18px 50px rgba(0, 0, 0, .22);
        }
        .image img { width: 100%; height: 100%; display:block; object-fit: cover; }
        .content { padding: 1.4rem; }
        .category { color: var(--muted); text-transform: uppercase; letter-spacing: .12em; font-size: .8rem; }
        h1 { margin: .35rem 0 0.5rem; font-size: clamp(2rem, 4vw, 3rem); }
        .price { color: var(--accent); font-size: 1.5rem; font-weight: 800; margin: .5rem 0 1rem; }
        .desc { color: #cbd5e1; line-height: 1.7; }
        .chips { display:flex; gap:.5rem; flex-wrap:wrap; margin:1rem 0; }
        .chip { padding:.45rem .7rem; border-radius:999px; background:rgba(255,255,255,.04); border:1px solid var(--border); }
        .actions { display:flex; gap:.75rem; flex-wrap:wrap; margin-top: 1rem; }
        .button {
            display:inline-flex; align-items:center; justify-content:center; padding:.85rem 1.15rem; border-radius:999px; text-decoration:none; font-weight:700; border:1px solid transparent;
        }
        .button.primary { background:var(--accent); color:#111827; }
        .button.secondary { background:transparent; color:var(--text); border-color:var(--border); }
        .details { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:.75rem; margin-top:1rem; }
        .detail { background: rgba(255,255,255,.03); border:1px solid var(--border); border-radius:16px; padding: .9rem; }
        .detail span { display:block; color: var(--muted); font-size:.82rem; margin-bottom:.35rem; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<main class="wrap">
    <a class="back" th:href="@{/}">← Back to catalog</a>
    <section class="grid">
        <div class="panel image">
            <img th:src="@{${product.imageUrl}}" th:alt="${product.name}">
        </div>
        <div class="panel content">
            <div class="category" th:text="${product.category.displayName}"></div>
            <h1 th:text="${product.name}"></h1>
            <div class="price" th:text="'₹' + ${#numbers.formatDecimal(product.priceInr, 1, 2)}"></div>
            <p class="desc" th:text="${product.description}"></p>
            <div class="chips">
                <span class="chip" th:each="size : ${sizes}" th:text="${size}"></span>
            </div>
            <div class="details">
                <div class="detail"><span>Stock</span><strong th:text="${product.stockQuantity}"></strong></div>
                <div class="detail"><span>Available sizes</span><strong th:text="${product.availableSizes}"></strong></div>
            </div>
            <div class="actions">
                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                    <input type="hidden" name="quantity" value="1">
                    <button class="button primary" type="submit">Add to Cart</button>
                </form>
                <a class="button secondary" th:href="@{/cart}">Go to Cart</a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
