<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <style>
        :root { color-scheme: dark; --panel:#10192b; --border:rgba(148,163,184,.16); --accent:#f59e0b; --text:#e5eefb; --muted:#94a3b8; }
        * { box-sizing:border-box; }
        body { margin:0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(135deg,#07111f 0%, #0f172a 100%); color:var(--text); padding:1.5rem; }
        .wrap { max-width: 1180px; margin: 0 auto; }
        .grid { display:grid; grid-template-columns: 1.2fr .8fr; gap:1rem; align-items:start; }
        .panel { background: rgba(16, 25, 43, 0.92); border:1px solid var(--border); border-radius:22px; overflow:hidden; }
        .head { padding:1rem 1.1rem; border-bottom:1px solid var(--border); }
        .content { padding:1.1rem; }
        label { display:block; margin:.9rem 0 .35rem; color:var(--muted); font-size:.9rem; }
        input, select, textarea {
            width:100%; background:#0b1220; color:var(--text); border:1px solid var(--border); border-radius:12px; padding:.8rem .9rem; font:inherit;
        }
        textarea { min-height: 96px; resize: vertical; }
        .two { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
        .button { display:inline-flex; align-items:center; justify-content:center; padding:.85rem 1.15rem; border-radius:999px; text-decoration:none; font-weight:700; border:1px solid transparent; }
        .button.primary { background:var(--accent); color:#111827; }
        .summary-row { display:flex; justify-content:space-between; gap:1rem; margin:.7rem 0; color:var(--muted); }
        .summary-row strong { color:var(--text); }
        .empty { padding:1.1rem; color:var(--muted); }
        .muted { color:var(--muted); }
        @media (max-width: 960px) { .grid { grid-template-columns: 1fr; } .two { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<main class="wrap">
    <div style="margin-bottom:1rem;">
        <a class="muted" th:href="@{/cart}">← Back to cart</a>
        <h1 style="margin:.4rem 0 0;">Checkout</h1>
        <p class="muted" style="margin:.4rem 0 0;">Complete your order and create a delivery-ready invoice.</p>
    </div>

    <div th:if="${#lists.isEmpty(cartItems)}" class="panel empty">Your cart is empty. Add products before checkout.</div>

    <div class="grid" th:if="${!#lists.isEmpty(cartItems)}">
        <section class="panel">
            <div class="head"><strong>Shipping & Payment</strong></div>
            <div class="content">
                <form th:action="@{/checkout}" th:object="${checkoutForm}" method="post">
                    <div class="two">
                        <div>
                            <label>Full Name</label>
                            <input type="text" th:field="*{customerName}">
                        </div>
                        <div>
                            <label>Email</label>
                            <input type="email" th:field="*{email}">
                        </div>
                    </div>
                    <div class="two">
                        <div>
                            <label>Phone</label>
                            <input type="text" th:field="*{phone}">
                        </div>
                        <div>
                            <label>Postal Code</label>
                            <input type="text" th:field="*{postalCode}">
                        </div>
                    </div>
                    <label>Shipping Address</label>
                    <textarea th:field="*{shippingAddress}"></textarea>
                    <div class="two">
                        <div>
                            <label>City</label>
                            <input type="text" th:field="*{city}">
                        </div>
                        <div>
                            <label>State</label>
                            <input type="text" th:field="*{state}">
                        </div>
                    </div>
                    <label>Payment Method</label>
                    <select th:field="*{paymentMethod}">
                        <option value="">Select payment method</option>
                        <option value="Cash on Delivery">Cash on Delivery</option>
                        <option value="UPI">UPI</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Debit Card">Debit Card</option>
                    </select>
                    <div style="margin-top:1rem;">
                        <button class="button primary" type="submit">Place Order</button>
                    </div>
                </form>
            </div>
        </section>

        <aside class="panel">
            <div class="head"><strong>Order Summary</strong></div>
            <div class="content">
                <div class="summary-row"><span>Items</span><strong th:text="${cartItems.size()}"></strong></div>
                <div class="summary-row"><span>Total</span><strong th:text="'₹' + ${#numbers.formatDecimal(cartTotal,1,2)}"></strong></div>
                <div class="muted" style="margin-top:.8rem; line-height:1.6;">Payment is currently mocked locally. Razorpay integration can be layered in next without changing this page structure.</div>
            </div>
        </aside>
    </div>
</main>
</body>
</html>
