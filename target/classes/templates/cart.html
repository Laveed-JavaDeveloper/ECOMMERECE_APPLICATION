<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <style>
        :root { color-scheme: dark; --border:rgba(148,163,184,.16); --accent:#f59e0b; --text:#e5eefb; --muted:#94a3b8; }
        * { box-sizing:border-box; }
        body { margin:0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(135deg,#07111f 0%, #0f172a 100%); color:var(--text); padding:1.5rem; }
        .wrap { max-width: 1180px; margin: 0 auto; }
        .top { display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap; align-items:center; margin-bottom:1rem; }
        .button {
            display:inline-flex; align-items:center; justify-content:center; padding:.8rem 1rem; border-radius:999px; text-decoration:none; font-weight:700; border:1px solid transparent;
        }
        .button.primary { background: var(--accent); color:#111827; }
        .button.secondary { background: transparent; color:var(--text); border-color:var(--border); }
        .layout { display:grid; grid-template-columns: 2fr 1fr; gap: 1rem; }
        .panel { background: rgba(16, 25, 43, 0.92); border:1px solid var(--border); border-radius:22px; overflow:hidden; box-shadow: 0 18px 50px rgba(0,0,0,.22); }
        .panel-head { padding:1rem 1.1rem; border-bottom:1px solid var(--border); }
        table { width:100%; border-collapse: collapse; }
        th, td { padding:1rem 1.1rem; text-align:left; border-bottom:1px solid var(--border); vertical-align: top; }
        th { color: var(--muted); font-size:.82rem; text-transform: uppercase; letter-spacing:.12em; }
        .item-name { font-weight:700; }
        .item-meta { color: var(--muted); font-size:.88rem; margin-top:.35rem; }
        .thumb { width:72px; height:72px; object-fit:cover; border-radius:14px; border:1px solid var(--border); }
        .summary { padding:1.1rem; display:grid; gap:.9rem; }
        .summary-row { display:flex; justify-content:space-between; gap:1rem; color:var(--muted); }
        .summary-row strong { color:var(--text); }
        .muted { color: var(--muted); }
        .form-inline { display:flex; gap:.5rem; flex-wrap:wrap; }
        input[type=number], select, input[type=text] { background:#0b1220; color:var(--text); border:1px solid var(--border); border-radius:12px; padding:.7rem .8rem; }
        .empty { padding: 1.5rem; color: var(--muted); }
        @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<main class="wrap">
    <div class="top">
        <div>
            <h1 style="margin:0;">Your Cart</h1>
            <p class="muted" style="margin:.45rem 0 0;">Review the items you want to buy and proceed to checkout.</p>
        </div>
        <a class="button secondary" th:href="@{/}">Continue Shopping</a>
    </div>

    <div class="layout">
        <section class="panel">
            <div class="panel-head"><strong>Items</strong></div>
            <div th:if="${#lists.isEmpty(cartItems)}" class="empty">Your cart is empty.</div>
            <table th:if="${!#lists.isEmpty(cartItems)}">
                <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Subtotal</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td>
                        <div style="display:flex; gap:.9rem; align-items:center;">
                            <img class="thumb" th:src="@{${item.product.imageUrl}}" th:alt="${item.product.name}">
                            <div>
                                <div class="item-name" th:text="${item.product.name}"></div>
                                <div class="item-meta" th:text="${item.product.category.displayName}"></div>
                                <div class="item-meta" th:text="'₹' + ${#numbers.formatDecimal(item.product.priceInr,1,2)}"></div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <form class="form-inline" th:action="@{/cart/update/{id}(id=${item.product.id})}" method="post">
                            <input type="number" name="quantity" min="1" th:value="${item.quantity}" style="width:90px;">
                            <button class="button secondary" type="submit">Update</button>
                        </form>
                    </td>
                    <td th:text="'₹' + ${#numbers.formatDecimal(item.subtotal,1,2)}"></td>
                    <td>
                        <form th:action="@{/cart/remove/{id}(id=${item.product.id})}" method="post">
                            <button class="button secondary" type="submit">Remove</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

        <aside class="panel">
            <div class="panel-head"><strong>Order Summary</strong></div>
            <div class="summary">
                <div class="summary-row"><span>Items</span><strong th:text="${cartItems.size()}"></strong></div>
                <div class="summary-row"><span>Total</span><strong th:text="'₹' + ${#numbers.formatDecimal(cartTotal,1,2)}"></strong></div>
                <a class="button primary" th:href="@{/checkout}">Proceed to Checkout</a>
            </div>
        </aside>
    </div>
</main>
</body>
</html>
